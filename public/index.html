<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>小游戏平台</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>
<!-- ════════════════════════════════════════════════════════════════ -->
<!-- 页面1: 昵称输入 -->
<!-- ════════════════════════════════════════════════════════════════ -->
<div id="page-name" class="page active">
  <div class="page-center">
    <div class="logo">🎮</div>
    <h1 class="platform-title">小游戏平台</h1>
    <p class="platform-desc">和朋友一起玩游戏！</p>
    <div class="input-group">
      <input type="text" id="player-name-input" class="input-field" placeholder="输入你的昵称" maxlength="8" autocomplete="off">
    </div>
    <button id="enter-platform-btn" class="btn btn-primary btn-large">进入平台</button>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════════════ -->
<!-- 页面2: 游戏大厅 -->
<!-- ════════════════════════════════════════════════════════════════ -->
<div id="page-lobby" class="page">
  <div class="lobby-header">
    <h1>🎮 小游戏平台</h1>
    <span id="lobby-player-name" class="player-tag"></span>
  </div>
  <div class="game-list">
    <div class="game-card" data-game="truth-or-dare">
      <div class="game-card-icon">🎯</div>
      <div class="game-card-info">
        <h2>真心话大冒险</h2>
        <p>经典派对游戏，和朋友一起玩！</p>
        <div class="game-meta">
          <span>👥 3-8人</span>
          <span>⏱ 15-30分钟</span>
        </div>
      </div>
      <div class="game-card-actions">
        <button class="btn btn-primary create-room-btn">创建房间</button>
        <button class="btn btn-secondary join-room-btn">加入房间</button>
      </div>
    </div>
    <div class="game-card game-card-disabled">
      <div class="game-card-icon">🔒</div>
      <div class="game-card-info">
        <h2>更多游戏开发中...</h2>
        <p>敬请期待！</p>
      </div>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════════════ -->
<!-- 页面3: 房间大厅 -->
<!-- ════════════════════════════════════════════════════════════════ -->
<div id="page-room" class="page">
  <div class="room-header">
    <button id="room-back-btn" class="btn btn-icon">←</button>
    <h2>🎯 真心话大冒险</h2>
    <div class="spacer"></div>
  </div>
  <div class="room-code-section">
    <p class="room-code-label">房间号</p>
    <div id="room-code-display" class="room-code">0000</div>
    <p class="room-code-hint">分享此房间号给朋友</p>
  </div>
  
  <div class="player-list-section">
    <h3>玩家列表 <span id="player-count" class="player-count">0/8</span></h3>
    <div id="player-list" class="player-list">
      <!-- 动态渲染 -->
    </div>
  </div>
  <div id="room-action-area" class="room-action-area">
    <button id="ready-btn" class="btn btn-primary btn-large">准备</button>
    <button id="start-game-btn" class="btn btn-success btn-large hidden">开始游戏</button>
    <button id="leave-room-btn" class="btn btn-outline">离开房间</button>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════════════ -->
<!-- 页面4: 游戏界面 (真心话大冒险) -->
<!-- ════════════════════════════════════════════════════════════════ -->
<div id="page-game" class="page">
  <!-- 游戏信息栏 -->
  <div class="game-header">
    <button id="game-leave-btn" class="btn btn-icon">←</button>
    <span class="game-title">🎯 真心话大冒险</span>
    <span id="round-display" class="round-display">第 1 轮</span>
  </div>

  <!-- 消息通知区域 -->
  <div id="game-notification" class="game-notification">
    <span id="notification-text">游戏开始！请掷骰子</span>
  </div>

  <!-- 圆桌区域 -->
  <div class="table-container">
    <canvas id="table-canvas"></canvas>
    <!-- 头像覆盖层 -->
    <div id="avatar-overlay" class="avatar-overlay"></div>
    <!-- 牌区（同心圆内） -->
    <div id="card-area" class="card-area">
      <div class="card-deck-label">🃏 牌堆</div>
    </div>
    <!-- 中央骰子动画区 -->
    <div id="dice-center" class="dice-center hidden">
      <div id="dice-animation" class="dice-animation">🎲</div>
    </div>
  </div>

  <!-- 底部操作区域 -->
  <div id="action-area" class="action-area">
    <!-- 按钮根据不同游戏阶段动态显示 -->
  </div>

  <!-- 模态弹窗 -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-content" class="modal-content">
      <!-- 动态内容 -->
    </div>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
